apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: production-cluster
  region: ap-south-1
  version: "1.30"

vpc:
  id: "vpc-08b22e0e8683f0f3c" # Your existing VPC ID
  subnets:
    public:
      ap-south-1a: { id: "subnet-038a1f4b11796e638" }
      ap-south-1b: { id: "subnet-07c40a709a601248c" }
    private:
      ap-south-1a: { id: "subnet-00f83d8c931aa7b85" }
      ap-south-1b: { id: "subnet-084a92e29ed189b82" }
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
  nat:
    gateway: HighlyAvailable # Ensures High Availability across AZs

managedNodeGroups:
  - name: standard-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    privateNetworking: true # Nodes stay in private subnets
    volumeSize: 20

